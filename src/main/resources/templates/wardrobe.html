<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfix - My Wardrobe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/wardrobe.css}">
    <link rel="stylesheet" th:href="@{/css/wardrobe-outfits.css}">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <a href="/"><img th:src="@{/image/LOGO.png}" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links" id="nav-links">
            <a href="/clothing">Clothing</a>
            <a href="/wardrobe" class="active">Wardrobe</a>
            <a href="/collection">Collection</a>
            <a href="/generate">Generate</a>
            <a href="/schedule">Schedule</a>
        </nav>
        <div class="nav-actions">
            <div class="notif-bell-wrap">
                <button class="icon-btn" id="notif-bell-btn" aria-label="Notifications">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <span class="notif-badge" id="notif-badge">2</span>
                <div class="notif-panel" id="notif-panel"></div>
            </div>
            <a href="/account" class="icon-btn"><i class="fa-regular fa-user"></i></a>
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="outfit-table-wrap">
        <div class="outfit-table-head">
            <div>
                <h1>MY WARDROBE</h1>
                <p>Your generated outfit mockups. Pending jobs refresh automatically.</p>
            </div>
            <a href="/generate/new" class="add-item-btn" title="Generate a new outfit">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </a>
        </div>

        <table class="outfit-table">
            <thead>
                <tr>
                    <th>Top</th>
                    <th>Pants</th>
                    <th>Event</th>
                    <th>Status</th>
                    <th>Mockup</th>
                    <th>Favorite</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="outfit-table-body">
                <!-- rows injected by wardrobe-outfits.js -->
            </tbody>
        </table>

        <div id="outfit-empty" class="outfit-empty" style="display:none;">
            <i class="fa-regular fa-images" style="font-size:32px;"></i>
            <p>No outfits yet. Head to <a href="/generate/new">Generate</a> to create one.</p>
        </div>
    </main>

    <script th:src="@{/js/app.state.js}"></script>
    <script th:src="@{/js/api.service.js}"></script>
    <script th:src="@{/js/script.js}"></script>
    <script th:src="@{/js/wardrobe-outfits.js}"></script>
</body>
</html>
