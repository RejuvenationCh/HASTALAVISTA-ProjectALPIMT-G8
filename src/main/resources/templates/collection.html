<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfix - My Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html"><img src="../static/image/LOGO.png" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="wardrobe.html">My Wardrobe</a>
            <a href="collection.html">Collection</a> 
            <a href="generate.html">Generate</a>
            <a href="schedule.html">Schedule</a>
        </nav>
        <div class="nav-actions">
            <button class="icon-btn auth-trigger"><i class="fa-regular fa-bell"></i></button> 
            <a href="account.html" class="icon-btn"><i class="fa-regular fa-user"></i></a> 
        </div>
    </header>

    <main class="collection-container">
        <h1>My Collection</h1>
        <div class="collection-empty-state">
            <i class="fa-solid fa-box-archive"></i>
            <p><strong>No Collection found</strong></p>
            <p>Save your favorite outfits to see them listed here.</p>
        </div>
    </main>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            
            <div id="login-form-container">
                <h2>Login</h2>
                <form id="login-form">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" name="email" required>
                    
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" name="password" required>
                    
                    <button type="submit" class="btn-solid">Login</button>
                </form>
            </div>
            <div id="signup-form-container" style="display: none;">
                <h2>Signup</h2>
                <form id="signup-form">
                    <label for="signup-email">Email:</label>
                    <input type="email" id="signup-email" name="email" required>
                    
                    <label for="signup-password">Password:</label>
                    <input type="password" id="signup-password" name="password" required>
                    
                    <button type="submit" class="btn-solid">Signup</button>
                </form>
            </div>
        </div>
    </div>
    <script src="../static/js/script.js"></script>
</body>
</html>
