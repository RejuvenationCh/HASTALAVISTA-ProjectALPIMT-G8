<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h1>Register</h1>

<form th:action="@{/register}" method="post">

    <input
            type="text"
            name="username"
            placeholder="Username">

    <input
            type="email"
            name="email"
            placeholder="email@example.com">

    <input
            type="password"
            name="password"
            placeholder="Password">

    <button type="submit">
        Register
    </button>

</form>

</body>
</html>
