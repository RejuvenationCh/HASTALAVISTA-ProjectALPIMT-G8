<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfix - My Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="/"><img src="/image/LOGO.png" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="/wardrobe">My Wardrobe</a>
            <a href="/collection" class="active">Collection</a>
            <a href="/generate">Generate</a>
            <a href="/schedule">Schedule</a>
        </nav>
        <div class="nav-actions">
            <div class="notif-bell-wrap">
                <button class="icon-btn" id="notif-bell-btn" aria-label="Notifications">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <span class="notif-badge" id="notif-badge">2</span>
                <div class="notif-panel" id="notif-panel"></div>
            </div>
            <a href="/account" class="icon-btn"><i class="fa-regular fa-user"></i></a>
        </div>
    </header>

    <main class="account-container">
        <h1>My Collection</h1>
        <div class="account-card">
            <div class="mix-empty-state">
                <i class="fa-solid fa-box-archive"></i>
                <p><strong>No Collection found</strong></p>
                <p>Save your favorite outfits to see them listed here.</p>
            </div>
        </div>
    </main>

    <script src="/js/app.state.js"></script>
    <script src="/js/api.service.js"></script>
    <script src="/js/script.js"></script>
</body>
</html>
