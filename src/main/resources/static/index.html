<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfix — ComfyUI Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    p.subtitle {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6366f1;
      margin-bottom: 1rem;
    }

    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .field-group.single { grid-template-columns: 1fr; }

    label {
      display: block;
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.35rem;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      color: #e5e5e5;
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus,
    input[type="file"]:focus { border-color: #6366f1; }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4f46e5; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    #status {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 1rem;
      min-height: 1.2rem;
    }

    #status.error   { color: #f87171; }
    #status.success { color: #4ade80; }

    .results {
      display: none;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .results.visible {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .result-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }

    .result-box .label {
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #1a1a1a;
      color: #6366f1;
      border-bottom: 1px solid #2a2a2a;
    }

    /* Checkerboard background makes transparency visible on the PNG */
    .result-box img {
      width: 100%;
      display: block;
      object-fit: contain;
      background: repeating-conic-gradient(#1a1a1a 0% 25%, #111 0% 50%) 0 0 / 20px 20px;
    }
  </style>
</head>
<body>

  <h1>Outfix — ComfyUI Test</h1>
  <p class="subtitle">Upload images, generate a full-outfit try-on, and see both outputs.</p>

  <!-- Step 1: Image uploads + generate -->
  <div class="card">
    <h2>1. Upload Images &amp; Generate</h2>
    <div class="field-group">
      <div>
        <label for="faceFile">Face / Body Photo</label>
        <input type="file" id="faceFile" accept="image/*" />
      </div>
      <div>
        <label for="topFile">Top Garment</label>
        <input type="file" id="topFile" accept="image/*" />
      </div>
      <div>
        <label for="bottomFile">Bottom Garment</label>
        <input type="file" id="bottomFile" accept="image/*" />
      </div>
      <div>
        <label for="shoesFile">Shoes</label>
        <input type="file" id="shoesFile" accept="image/*" />
      </div>
    </div>
    <button id="generateBtn" onclick="generate()">Upload &amp; Generate</button>
    <div id="status"></div>
  </div>

  <!-- Step 3: Results -->
  <div id="results" class="results">
    <div class="result-box">
      <div class="label">JPG — Final Result</div>
      <img id="jpgOutput" src="" alt="JPG output" />
    </div>
    <div class="result-box">
      <div class="label">PNG — Background Removed</div>
      <img id="pngOutput" src="" alt="PNG output" />
    </div>
  </div>

  <script>
    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    /** Uploads one image file to ComfyUI via our backend proxy. Returns the filename. */
    async function uploadFile(file) {
      const form = new FormData();
      form.append('image', file);

      const res = await fetch('/api/mockup/upload', {
        method: 'POST',
        body: form
      });

      if (!res.ok) throw new Error('Upload failed for: ' + file.name);
      const data = await res.json();
      return data.name;
    }

    async function generate() {
      const faceFile   = document.getElementById('faceFile').files[0];
      const topFile    = document.getElementById('topFile').files[0];
      const bottomFile = document.getElementById('bottomFile').files[0];
      const shoesFile  = document.getElementById('shoesFile').files[0];

      if (!faceFile || !topFile || !bottomFile || !shoesFile)
        return setStatus('Select all 4 images before generating.', 'error');

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      document.getElementById('results').classList.remove('visible');

      try {
        setStatus('Uploading 4 images to ComfyUI...');

        // Upload all 4 images in parallel to save time
        const [faceName, topName, bottomName, shoesName] = await Promise.all([
          uploadFile(faceFile),
          uploadFile(topFile),
          uploadFile(bottomFile),
          uploadFile(shoesFile)
        ]);

        setStatus('Images uploaded. Generating outfit (this can take a few minutes)...');

        const res = await fetch('/api/mockup/full', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            faceFilename:   faceName,
            topFilename:    topName,
            bottomFilename: bottomName,
            shoesFilename:  shoesName
          })
        });

        const data = await res.json();

        if (data.status === 'success') {
          document.getElementById('jpgOutput').src = data.imageUrl;
          document.getElementById('pngOutput').src = data.pngImageUrl;
          document.getElementById('results').classList.add('visible');
          setStatus('Generation complete.', 'success');

        } else if (data.status === 'timeout') {
          setStatus('Timed out — ComfyUI took too long. Try again.', 'error');

        } else {
          setStatus('Error: ' + (data.message || 'Unknown error'), 'error');
        }

      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
