<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfix — ComfyUI Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #fff;
    }

    p.subtitle {
      font-size: 0.875rem;
      color: #888;
      margin-bottom: 2rem;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6366f1;
      margin-bottom: 1rem;
    }

    .field-group {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    /* Hidden native file input — triggered by clicking the upload zone */
    input[type="file"] { display: none; }

    .upload-zone {
      position: relative;
      border: 2px dashed #333;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 2 / 3;
      background: #111;
      transition: border-color 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .upload-zone:hover { border-color: #6366f1; }

    .upload-zone.has-image { border-style: solid; border-color: #6366f1; }

    .upload-zone .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.35rem;
      color: #555;
      pointer-events: none;
    }

    .upload-zone .placeholder svg {
      width: 28px;
      height: 28px;
      stroke: #444;
    }

    .upload-zone .placeholder span {
      font-size: 0.75rem;
    }

    .upload-zone .preview-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .upload-zone.has-image .preview-img { display: block; }
    .upload-zone.has-image .placeholder { display: none; }

    .upload-zone .change-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.04em;
    }

    .upload-zone.has-image:hover .change-overlay { display: flex; }

    .field-label {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 0.35rem;
    }

    button {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #4f46e5; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    #status {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 1rem;
      min-height: 1.2rem;
    }

    #status.error   { color: #f87171; }
    #status.success { color: #4ade80; }

    .results {
      display: none;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .results.visible {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .result-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
    }

    .result-box .label {
      padding: 0.6rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #1a1a1a;
      color: #6366f1;
      border-bottom: 1px solid #2a2a2a;
    }

    /* Checkerboard background makes transparency visible on the PNG */
    .result-box img {
      width: 100%;
      display: block;
      object-fit: contain;
      background: repeating-conic-gradient(#1a1a1a 0% 25%, #111 0% 50%) 0 0 / 20px 20px;
    }
  </style>
</head>
<body>

  <h1>Outfix — ComfyUI Test</h1>
  <p class="subtitle">Upload images, generate a full-outfit try-on, and see both outputs.</p>

  <div class="card">
    <h2>1. Upload Images &amp; Generate</h2>
    <div class="field-group">

      <div>
        <div class="field-label">Face / Body Photo</div>
        <div class="upload-zone" onclick="document.getElementById('faceFile').click()">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16v-8m-4 4h8"/><rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <span>Face / Body</span>
          </div>
          <img class="preview-img" alt="Face preview" />
          <div class="change-overlay">Change</div>
        </div>
        <input type="file" id="faceFile" accept="image/*" onchange="setPreview(this, 'faceFile')" />
      </div>

      <div>
        <div class="field-label">Top Garment</div>
        <div class="upload-zone" onclick="document.getElementById('topFile').click()">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16v-8m-4 4h8"/><rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <span>Top</span>
          </div>
          <img class="preview-img" alt="Top preview" />
          <div class="change-overlay">Change</div>
        </div>
        <input type="file" id="topFile" accept="image/*" onchange="setPreview(this, 'topFile')" />
      </div>

      <div>
        <div class="field-label">Bottom Garment</div>
        <div class="upload-zone" onclick="document.getElementById('bottomFile').click()">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16v-8m-4 4h8"/><rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <span>Bottom</span>
          </div>
          <img class="preview-img" alt="Bottom preview" />
          <div class="change-overlay">Change</div>
        </div>
        <input type="file" id="bottomFile" accept="image/*" onchange="setPreview(this, 'bottomFile')" />
      </div>

      <div>
        <div class="field-label">Shoes</div>
        <div class="upload-zone" onclick="document.getElementById('shoesFile').click()">
          <div class="placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 16v-8m-4 4h8"/><rect x="3" y="3" width="18" height="18" rx="3"/>
            </svg>
            <span>Shoes</span>
          </div>
          <img class="preview-img" alt="Shoes preview" />
          <div class="change-overlay">Change</div>
        </div>
        <input type="file" id="shoesFile" accept="image/*" onchange="setPreview(this, 'shoesFile')" />
      </div>

    </div>
    <button id="generateBtn" onclick="generate()">Upload &amp; Generate</button>
    <div id="status"></div>
  </div>

  <div id="results" class="results">
    <div class="result-box">
      <div class="label">JPG — Final Result</div>
      <img id="jpgOutput" src="" alt="JPG output" />
    </div>
    <div class="result-box">
      <div class="label">PNG — Background Removed</div>
      <img id="pngOutput" src="" alt="PNG output" />
    </div>
  </div>

  <script>
    function setPreview(input, inputId) {
      const file = input.files[0];
      if (!file) return;
      const zone = input.previousElementSibling;
      const img  = zone.querySelector('.preview-img');
      img.src = URL.createObjectURL(file);
      zone.classList.add('has-image');
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    async function uploadFile(file) {
      const form = new FormData();
      form.append('image', file);
      const res = await fetch('/api/mockup/upload', { method: 'POST', body: form });
      if (!res.ok) throw new Error('Upload failed for: ' + file.name);
      const data = await res.json();
      return data.name;
    }

    async function generate() {
      const faceFile   = document.getElementById('faceFile').files[0];
      const topFile    = document.getElementById('topFile').files[0];
      const bottomFile = document.getElementById('bottomFile').files[0];
      const shoesFile  = document.getElementById('shoesFile').files[0];

      if (!faceFile || !topFile || !bottomFile || !shoesFile)
        return setStatus('Select all 4 images before generating.', 'error');

      const btn = document.getElementById('generateBtn');
      btn.disabled = true;
      document.getElementById('results').classList.remove('visible');

      try {
        setStatus('Uploading 4 images to ComfyUI...');

        const [faceName, topName, bottomName, shoesName] = await Promise.all([
          uploadFile(faceFile),
          uploadFile(topFile),
          uploadFile(bottomFile),
          uploadFile(shoesFile)
        ]);

        setStatus('Images uploaded. Generating outfit (this can take a few minutes)...');

        const res = await fetch('/api/mockup/full', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            faceFilename:   faceName,
            topFilename:    topName,
            bottomFilename: bottomName,
            shoesFilename:  shoesName
          })
        });

        const data = await res.json();

        if (data.status === 'success') {
          document.getElementById('jpgOutput').src = data.imageUrl;
          if (data.pngImageUrl) {
            document.getElementById('pngOutput').src = data.pngImageUrl;
            document.getElementById('results').classList.add('visible');
          } else {
            document.getElementById('results').style.gridTemplateColumns = '1fr';
            document.getElementById('results').classList.add('visible');
          }
          setStatus('Generation complete.', 'success');

        } else if (data.status === 'timeout') {
          setStatus('Timed out — ComfyUI took too long. Try again.', 'error');

        } else {
          setStatus('Error: ' + (data.message || 'Unknown error'), 'error');
        }

      } catch (err) {
        setStatus('Error: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
