# =============================================
# Application
# =============================================
spring.application.name=outfix
server.port=8080

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# =============================================
# ComfyUI Integration
# =============================================
comfyui.base-url=http://localhost:8188
comfyui.client-id=outfix

# --- Single garment (workflow_template.json) ---
comfyui.node.face-input-id=295
comfyui.node.garment-input-id=297
comfyui.node.segment-node-id=307
comfyui.node.catvton-node-id=305
comfyui.node.output-node-id=163

# --- Full outfit (workflow_full_outfit_template.json) ---
comfyui.node.top-garment-input-id=310
comfyui.node.bottom-garment-input-id=311
comfyui.node.shoes-garment-input-id=312
comfyui.node.catvton-pass2-node-id=316
comfyui.node.catvton-pass3-node-id=318
comfyui.node.full-outfit-output-node-id=163

# Poll /history this many times (2 s each) before giving up
comfyui.polling.max-attempts=210
