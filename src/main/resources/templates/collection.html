<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfix - My Collection</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/collection.css}">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="/"><img th:src="@{/image/LOGO.png}" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links" id="nav-links">
            <a href="/clothing">Clothing</a>
            <a href="/wardrobe">Wardrobe</a>
            <a href="/collection" class="active">Collection</a>
            <a href="/generate">Generate</a>
            <a href="/schedule">Schedule</a>
        </nav>
        <div class="nav-actions">
            <div class="notif-bell-wrap">
                <button class="icon-btn" id="notif-bell-btn" aria-label="Notifications">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <span class="notif-badge" id="notif-badge">2</span>
                <div class="notif-panel" id="notif-panel"></div>
            </div>
            <a href="/account" class="icon-btn"><i class="fa-regular fa-user"></i></a>
            <button class="hamburger-btn" id="hamburger-btn" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </header>

    <main class="coll-wrap">
        <h1>My Collection</h1>
        <p style="color:#777; margin-top:4px;">Your favorited clothing and outfits.</p>

        <div class="coll-tabs">
            <button class="coll-tab active" data-filter="all">All</button>
            <button class="coll-tab" data-filter="clothing">Clothing</button>
            <button class="coll-tab" data-filter="fashion">Fashion</button>
        </div>

        <div class="coll-grid" id="coll-grid"></div>

        <div class="coll-empty" id="coll-empty" style="display:none;">
            <i class="fa-regular fa-heart" style="font-size:32px;"></i>
            <p>Nothing favorited yet. Tap the ♥ on a clothing item or an outfit to save it here.</p>
        </div>
    </main>

    <script th:src="@{/js/app.state.js}"></script>
    <script th:src="@{/js/api.service.js}"></script>
    <script th:src="@{/js/auth-guard.js}"></script>
    <script th:src="@{/js/script.js}"></script>
    <script th:src="@{/js/collection.js}"></script>
</body>
</html>
