<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfix - My Wardrobe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/wardrobe.css}">
    <style>
        .outfit-table-wrap { padding: 32px 48px; }
        .outfit-table-head { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px; }
        .outfit-table-head h1 { margin:0; }
        .outfit-table-head p { color:#777; margin:4px 0 0; }
        .outfit-table { width:100%; border-collapse:collapse; background:#fff; }
        .outfit-table th, .outfit-table td { padding:14px 16px; text-align:left; border-bottom:1px solid #eee; vertical-align:middle; }
        .outfit-table th { font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:#999; }
        .outfit-thumb { width:48px; height:64px; object-fit:cover; border-radius:6px; background:#f3f3f3; }
        .mockup-thumb { width:80px; height:110px; object-fit:cover; border-radius:8px; background:#f3f3f3; }
        .status-pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:5px 10px; border-radius:999px; }
        .status-PENDING { background:#fff4e0; color:#b8860b; }
        .status-DONE    { background:#e7f7ec; color:#1f9d55; }
        .status-FAILED  { background:#fdecec; color:#c0392b; }
        .row-fav-btn, .row-del-btn { border:none; background:none; cursor:pointer; font-size:16px; color:#bbb; }
        .row-fav-btn.active { color:#e63946; }
        .outfit-empty, .outfit-error { text-align:center; color:#888; padding:60px 0; }
        .retry-btn { margin-left:8px; border:1px solid #c0392b; color:#c0392b; background:none; border-radius:6px; padding:3px 10px; cursor:pointer; font-size:11px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <a href="/"><img th:src="@{/image/LOGO.png}" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="/clothing">Clothing</a>
            <a href="/wardrobe" class="active">Wardrobe</a>
            <a href="/collection">Collection</a>
            <a href="/generate">Generate</a>
            <a href="/schedule">Schedule</a>
        </nav>
        <div class="nav-actions">
            <div class="notif-bell-wrap">
                <button class="icon-btn" id="notif-bell-btn" aria-label="Notifications">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <span class="notif-badge" id="notif-badge">2</span>
                <div class="notif-panel" id="notif-panel"></div>
            </div>
            <a href="/account" class="icon-btn"><i class="fa-regular fa-user"></i></a>
        </div>
    </header>

    <main class="outfit-table-wrap">
        <div class="outfit-table-head">
            <div>
                <h1>MY WARDROBE</h1>
                <p>Your generated outfit mockups. Pending jobs refresh automatically.</p>
            </div>
            <a href="/generate/new" class="add-item-btn" title="Generate a new outfit">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </a>
        </div>

        <table class="outfit-table">
            <thead>
                <tr>
                    <th>Top</th>
                    <th>Pants</th>
                    <th>Event</th>
                    <th>Status</th>
                    <th>Mockup</th>
                    <th>Favorite</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="outfit-table-body">
                <!-- rows injected by wardrobe-outfits.js -->
            </tbody>
        </table>

        <div id="outfit-empty" class="outfit-empty" style="display:none;">
            <i class="fa-regular fa-images" style="font-size:32px;"></i>
            <p>No outfits yet. Head to <a href="/generate/new">Generate</a> to create one.</p>
        </div>
    </main>

    <script th:src="@{/js/app.state.js}"></script>
    <script th:src="@{/js/api.service.js}"></script>
    <script th:src="@{/js/script.js}"></script>
    <script th:src="@{/js/wardrobe-outfits.js}"></script>
</body>
</html>
