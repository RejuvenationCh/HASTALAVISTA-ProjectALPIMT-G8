# =============================================
# Application
# =============================================
spring.application.name=outfix
server.port=8080

# =============================================
# MySQL DataSource
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/outfix_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# File Upload
# =============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

# =============================================
# ComfyUI Integration
# =============================================
comfyui.base-url=http://localhost:8188
comfyui.client-id=outfix

# Which node IDs in your workflow_template.json receive the image paths.
# Change these to match your actual exported workflow's node IDs.
comfyui.node.face-input-id=1
comfyui.node.garment-input-id=2

# Which node ID produces the final image output (SaveImage or PreviewImage node).
comfyui.node.output-node-id=9

# How many times to poll /history before giving up (each attempt waits 2 seconds).
comfyui.polling.max-attempts=30
