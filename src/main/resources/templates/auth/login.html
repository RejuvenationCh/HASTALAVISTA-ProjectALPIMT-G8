<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h1>Login</h1>

<form th:action="@{/login}" method="post">

    <input
            type="text"
            name="username"
            placeholder="Email">

    <input
            type="password"
            name="password"
            placeholder="Password">

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
