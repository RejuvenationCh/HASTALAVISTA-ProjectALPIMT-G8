<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outfix - Schedule</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/schedule.css">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <a href="/"><img src="/image/LOGO.png" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="/wardrobe">My Wardrobe</a>
            <a href="/collection">Collection</a>
            <a href="/generate">Generate</a>
            <a href="/schedule" class="active">Schedule</a>
        </nav>
        <div class="nav-actions">
            <div class="notif-bell-wrap">
                <button class="icon-btn" id="notif-bell-btn" aria-label="Notifications">
                    <i class="fa-regular fa-bell"></i>
                </button>
                <span class="notif-badge" id="notif-badge">2</span>
                <div class="notif-panel" id="notif-panel"></div>
            </div>
            <a href="/account" class="icon-btn"><i class="fa-regular fa-user"></i></a>
        </div>
    </header>

    <main>
        <!-- Page Header -->
        <div class="schedule-page-header">
            <h1 class="schedule-page-title">Schedule</h1>
            <button class="btn-add-event-top" onclick="openAddEventModal(null)">
                Add Event &nbsp;+
            </button>
        </div>
        <hr class="schedule-page-divider" />

        <!-- Calendar -->
        <div class="calendar-wrapper">
            <div class="calendar-month-label" id="calendarMonthLabel"></div>
            <div class="calendar-grid" id="calendarGrid">
                <div class="day-header-cell">MON</div>
                <div class="day-header-cell">TUE</div>
                <div class="day-header-cell">WED</div>
                <div class="day-header-cell">THU</div>
                <div class="day-header-cell">FRI</div>
                <div class="day-header-cell">SAT</div>
                <div class="day-header-cell">SUN</div>
                <!-- Day cells are injected here by buildCalendar() -->
            </div>
        </div>
    </main>

    <div class="backdrop" id="backdrop" onclick="closeAllModals()"></div>

    <div class="modal-box event-list-modal" id="eventListModal">
        <div class="event-list-modal-header">
            <span class="event-list-modal-title">Event List</span>
            <button class="btn-add-for-day" id="addForDayBtn">
                <i class="bi bi-plus"></i> Add
            </button>
        </div>
        <div id="eventListBody">
            <!-- Event items are injected here by openEventListModal() -->
        </div>
    </div>

    <div class="modal-box add-event-modal" id="addEventModal">
        <div class="add-event-left-panel">
            <div class="panel-heading">Add<br>Event</div>
        </div>
        <div class="add-event-right-panel">
            <div class="form-field-group">
                <label class="form-field-label" for="inputName">Name</label>
                <input type="text" class="form-field-input" id="inputName" placeholder="Ex. College, Fine Dining" />
            </div>
            <div class="form-field-group">
                <label class="form-field-label" for="inputCategory">Category</label>
                <select class="form-field-select" id="inputCategory">
                    <option value="">Choose your event category</option>
                    <option value="Casual">Casual</option>
                    <option value="Formal">Formal</option>
                    <option value="Sports">Sports</option>
                    <option value="Party">Party</option>
                    <option value="Work">Work</option>
                    <option value="Fine Dining">Fine Dining</option>
                    <option value="College">College</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="form-field-group">
                <label class="form-field-label" for="inputDate">Date</label>
                <input type="date" class="form-field-input" id="inputDate" />
            </div>
            <div class="form-submit-row">
                <button class="btn-submit-event" onclick="submitAddEvent()">Add</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
    <script src="/js/app.state.js"></script>
    <script src="/js/api.service.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/schedule.js"></script>
</body>

</html>
