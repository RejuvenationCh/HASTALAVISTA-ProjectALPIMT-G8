<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfix - Generate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <a href="index.html"><img src="../static/image/LOGO.png" alt="Outfix Logo"></a>
        </div>
        <nav class="nav-links">
            <a href="account.html" class="auth-trigger">My Wardrobe</a>
            <a href="collection.html" class="auth-trigger">Collection</a>
            <a href="generate.html">Generate</a>
            <a href="schedule.html" class="auth-trigger">Schedule</a>
        </nav>
        <div class="nav-actions">
            <button class="icon-btn auth-trigger"><i class="fa-regular fa-bell"></i></button> 
            <a href="account.html" class="icon-btn"><i class="fa-regular fa-user"></i></a> 
        </div>
    </header>

    <main class="generate-section">
        <img src="../static/image/GENERATE YOURS.jpg" alt="Generate Yours" class="generate-banner">
        
        <button class="create-now-btn auth-trigger">Create Now</button>
    </main>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            
            <div id="login-form-container">
                <h2>Login</h2>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Your email/phone Number">
                </div>
                <button class="modal-btn">Next</button>
                <div class="toggle-auth">
                    Don't have account? <a id="go-to-signup">Signup here</a>
                </div>
            </div>

            <div id="signup-form-container" style="display: none;">
                <h2>Register</h2>
                <p>Create account to be our member to earn points, get free vouchers, and hear our news earlier.</p>
                
                <div class="input-group">
                    <input type="text" placeholder="Your Full Name">
                </div>
                <div class="input-group">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Your email/phone Number">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password">
                </div>
                <button class="modal-btn">Next</button>
                <div class="toggle-auth">
                    Already have account? <a id="go-to-login">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../static/js/script.js"></script>
</body>
</html>
