<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outfix - My Collection</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="icon" href="/image/LOGO.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="outfix-studio">

  <header class="navbar">
    <div class="logo">
      <a href="/"><img src="/image/LOGO.png" alt="Outfix Logo"></a>
    </div>
    <nav class="nav-links">
      <a href="/wardrobe">My Wardrobe</a>
      <a href="/collection" class="active">Collection</a>
      <a href="/generate">Generate</a>
      <a href="/schedule">Schedule</a>
    </nav>
    <div class="nav-actions">
      <div class="notif-bell-wrap">
        <button class="icon-btn" id="notif-bell-btn" aria-label="Notifications">
          <i class="fa-regular fa-bell"></i>
        </button>
        <span class="notif-badge" id="notif-badge">2</span>
        <div class="notif-panel" id="notif-panel"></div>
      </div>
      <a href="/account" class="icon-btn"><i class="fa-regular fa-user"></i></a>
    </div>
  </header>

  <main class="studio" id="collection-page">

    <aside class="rail">
      <button class="rail__item" data-toast="Home">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11 12 3l9 8" /><path d="M5 10v10h14V10" /></svg>
        Home
      </button>
      <button class="rail__item" data-toast="Style stats">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2" /></svg>
        Stats
      </button>
      <button class="rail__item is-active" data-toast="Collection">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h18v13H3z" /><path d="M3 7l3-4h12l3 4" /><path d="M9 11a3 3 0 0 0 6 0" /></svg>
        Closet
      </button>
      <button class="rail__item" data-toast="Shared outfits">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3" /><path d="M3 20c0-3.3 2.7-5 6-5s6 1.7 6 5" /><circle cx="17.5" cy="9" r="2.5" /><path d="M16 14.2c2.6.2 5 1.7 5 4.8" /></svg>
        Looks
      </button>
      <div class="rail__spacer"></div>
      <button class="rail__item" data-toast="More">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2" /><circle cx="12" cy="12" r="2" /><circle cx="19" cy="12" r="2" /></svg>
        More
      </button>
    </aside>

    <section class="catalog">
      <div class="catalog__top">
        <div class="seg" id="source-seg">
          <button class="seg__btn is-active" data-source="collection">My Collection</button>
          <button class="seg__btn" data-source="market">Marketplace</button>
        </div>
        <div class="search">
          <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" /></svg>
          <input id="search-input" type="search" placeholder="Search items…" />
        </div>
      </div>

      <div class="cats" id="cats">
        <button class="cats__btn is-active" data-cat="all">All</button>
        <button class="cats__btn" data-cat="tops">Tops</button>
        <button class="cats__btn" data-cat="bottoms">Bottoms</button>
        <button class="cats__btn" data-cat="outerwear">Outerwear</button>
        <button class="cats__btn" data-cat="dresses">Dresses</button>
        <button class="cats__btn" data-cat="footwear">Footwear</button>
        <button class="cats__btn" data-cat="accessories">Accessories</button>
      </div>

      <div class="grid-scroll">
        <div class="item-grid" id="item-grid">
        </div>
      </div>
    </section>

    <aside class="preview">
      <div class="preview__head">
        <h3>Preview</h3>
        <div class="preview__tools">
          <button class="tool-btn" id="undo-btn" disabled aria-label="Undo">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 7 4 12l5 5" /><path d="M4 12h11a5 5 0 0 1 0 10h-1" /></svg>
          </button>
          <button class="tool-btn" id="redo-btn" disabled aria-label="Redo">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 7 5 5-5 5" /><path d="M20 12H9a5 5 0 0 0 0 10h1" /></svg>
          </button>
          <button class="tool-btn" data-toast="View settings" aria-label="Settings">
            <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 15M4.6 9a1.6 1.6 0 0 0-.3-1.8L4.2 7a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 3V3a2 2 0 0 1 4 0v.1A1.6 1.6 0 0 0 17 4.6l.1-.1A2 2 0 1 1 19.9 7l-.1.1a1.6 1.6 0 0 0 .3 1.8" /></svg>
          </button>
        </div>
      </div>

      <div class="preview__stage">
        <div class="grid-floor" aria-hidden="true"></div>
        <div id="preview-content">
        </div>
      </div>

      <div class="preview__foot">
        <button class="btn" id="add-to-outfit">Add to outfit</button>
        <a class="btn btn--ghost" href="generate.html" id="style-this">Generate with this</a>
      </div>
    </aside>
  </main>

  <input type="file" id="upload-input" accept="image/*" hidden />

  <div class="toast" id="toast"></div>

  <script src="/js/app.state.js"></script>
  <script src="/js/api.service.js"></script>
  <script src="/js/script.js"></script>
</body>
</html>
